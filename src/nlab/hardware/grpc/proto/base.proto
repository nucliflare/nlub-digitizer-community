syntax = "proto3";

package base;

message Versions {
	int32 protocol_main_major = 1;
	int32 protocol_main_minor = 2;
	int32 protocol_main_patch = 3;
	
	int32 protocol_ids_major = 4;
	int32 protocol_ids_minor = 5;
	int32 protocol_ids_patch = 6;
	
	int32 server_main_major = 7;
	int32 server_main_minor = 8;
	int32 server_main_patch = 9;
	
	int32 server_ids_major = 10;
	int32 server_ids_minor = 11;
	int32 server_ids_patch = 12;
	
	int32 server_streamer_major = 13;
	int32 server_streamer_minor = 14;
	int32 server_streamer_patch = 15;
	
	int32 vdpp_hw_api_major = 16;
	int32 vdpp_hw_api_minor = 17;
	int32 vdpp_hw_api_patch = 18;
	
	int32 grpc_major = 19;
	int32 grpc_minor = 20;
	int32 grpc_patch = 21;
	
	int32 protobuf_major = 22;
	int32 protobuf_minor = 23;
	int32 protobuf_patch = 24;
}


message Empty {
}

message SuccessResponse {
}

enum H_Channel {
	UNDEFINED = 0;
	CH_A = 1;
	CH_B = 2;
}

message ErrorStatus {
  int32 error_code = 1;
  string message = 2;
}

message MetaValue {
  string name=1;
  int32 id=2;
  string unit=3;
  string type=4;
  string value=5;
}

//TODO encapsulate in versions
message ids_ip_version {
	uint32 ITERATION=1;
	uint32 ID_NUMBER=2;
	uint32 IP_VERSION=3;
	uint32 HW_VERSION=4;
};

message ValueMessage {
	H_Channel channel =1;
	oneof value{
		Empty empty = 2;
		uint32 t_uint32 = 3;
		int32 t_int32 = 4;
		double t_double = 5;
		string t_string = 7;
		uint64 t_uint64 = 8;
		int64 t_int64 = 9;
    }
    uint32 index=6;
    repeated ids_ip_version ids_ip =10;
    uint32 address=50;
}

message EResponse {
  ValueMessage value=1;
  oneof response {
    SuccessResponse success_response = 2;
    ErrorStatus error_response = 3;
  }
  repeated int32 int32_array=4;
  repeated int32 int32_array2=5;
  repeated uint32 uint32_array=6;
  repeated uint32 uint32_array2=7;
  repeated double float_array=8;
  repeated string string_array=9;
}
