name: build
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs-on: windows-local
            python-exe: python
            venv-python: .venv/Scripts/python.exe
            artifact: dist/main.dist
          - name: ubuntu
            runs-on: ubuntu-local
            python-exe: python3
            venv-python: .venv/bin/python
            artifact: dist/main.dist
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.name == 'windows'
        with:
          python-version: "3.12"

      - name: Install Qt runtime deps (Linux only)
        if: matrix.name == 'ubuntu'
        run: |
          apt-get update
          apt-get install -y libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 patchelf

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: ${{ matrix.python-exe }} scripts/check_release_tag.py

      - name: Create venv (Windows)
        if: matrix.name == 'windows'
        run: python -m venv .venv

      - name: Create venv (Linux - uv downloads Python 3.12 automatically)
        if: matrix.name == 'ubuntu'
        run: |
          pip3 install uv
          uv venv --python 3.12 .venv

      - name: Install
        run: |
          ${{ matrix.venv-python }} -m pip install --upgrade pip uv
          ${{ matrix.venv-python }} -m uv pip install -e ".[dev]"

      - name: Generate UI modules
        run: ${{ matrix.venv-python }} scripts/build_ui.py

      - name: Generate gRPC stubs
        run: ${{ matrix.venv-python }} scripts/generate_proto.py

      - name: Lint
        continue-on-error: true
        run: |
          ${{ matrix.venv-python }} -m ruff check .
          ${{ matrix.venv-python }} -m mypy src/nlab

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ${{ matrix.venv-python }} -m pytest

      - name: Build
        run: ${{ matrix.venv-python }} scripts/build_nuitka.py

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: nlab-${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-local
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: Create Gitea Release
        uses: akkuman/gitea-release-action@v1
        with:
          files: dist/**/*
