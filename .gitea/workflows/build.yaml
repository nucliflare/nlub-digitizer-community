name: build
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs-on: windows-local
            build-cmd: python scripts/build_pyinstaller.py
            artifact: dist/nlab.exe
          - name: ubuntu
            runs-on: ubuntu-local
            build-cmd: python scripts/build_pyinstaller.py
            artifact: dist/nlab
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime deps (Linux only)
        if: matrix.name == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e ".[dev]"

      - name: Lint
        continue-on-error: true
        run: |
          ruff check .
          mypy src/nlab

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest

      - name: Build
        run: ${{ matrix.build-cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: nlab-${{ matrix.name }}
          path: ${{ matrix.artifact }}