name: build
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs-on: windows-local
            venv-python: .venv/Scripts/python.exe
            artifact: dist/nlab.exe
          - name: ubuntu
            runs-on: ubuntu-local
            venv-python: .venv/bin/python
            artifact: dist/nlab
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime deps (Linux only)
        if: matrix.name == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Create venv
        run: python -m venv .venv

      - name: Install
        run: |
          ${{ matrix.venv-python }} -m pip install --upgrade pip uv
          ${{ matrix.venv-python }} -m uv pip install -e ".[dev]"

      - name: Generate UI modules
        run: ${{ matrix.venv-python }} scripts/build_ui.py

      - name: Generate gRPC stubs
        run: ${{ matrix.venv-python }} scripts/generate_proto.py

      - name: Lint
        continue-on-error: true
        run: |
          ${{ matrix.venv-python }} -m ruff check .
          ${{ matrix.venv-python }} -m mypy src/nlab

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ${{ matrix.venv-python }} -m pytest

      - name: Build
        run: ${{ matrix.venv-python }} scripts/build_pyinstaller.py

      - uses: actions/upload-artifact@v3
        with:
          name: nlab-${{ matrix.name }}
          path: ${{ matrix.artifact }}
